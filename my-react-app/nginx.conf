server { #serves frontend and routes API to backend
    listen 80;

    # Serve the React build
    location / {
        root /usr/share/nginx/html; #folder where react is build 
        index index.html; #default to open
        # For React Router: redirect all unknown paths to index.html
        try_files $uri $uri/ /index.html;  #try to find the requested file , If not return index.html 
    }

    # Proxy API calls to the backend container
    # e.g. /api/tasks → http://backend:5284/tasks
    location /api/ { #proxy is a middleman
        proxy_pass http://backend:5284/;
        proxy_http_version 1.1; #uses http version 1.1 when talking to backend
        proxy_set_header Host $host; #send original host info to backend
        proxy_set_header X-Real-IP $remote_addr; #send real client IP to backend
    }
}
# to avoid the direct expose of address we use proxy that is middleman and also use the host and ID to backend
#Browser → Nginx → Backend