version: '3.8'

services:
  db:
    image: postgres:15
    container_name: todo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tododb
    ports:
      - "5432:5432"
    networks:
      - todo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend        # adjust path to your .NET project folder
    container_name: todo_backend
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=tododb;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:80"
    networks:
      - todo-net

networks:
  todo-net:
    driver: bridge